name: Documentation Issue
description: Report issues with documentation
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Report documentation issues (missing info, errors, suggestions).

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: What is wrong or missing in the documentation?
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page / Section
      description: Which documentation page or section is affected?
      placeholder: e.g. Guide > Getting Started
